services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: snake_arena
      POSTGRES_USER: snake_arena
      POSTGRES_PASSWORD: snake_arena
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snake_arena -d snake_arena"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://snake_arena:snake_arena@postgres:5432/snake_arena
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
